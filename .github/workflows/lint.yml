name: Lint

on:
    push:
    pull_request:

jobs:
    eslint:
        name: ESLint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install node v24
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
            - name: Install dependencies
              run: npm install
            - name: Run ESLint
              run: npm run lint
